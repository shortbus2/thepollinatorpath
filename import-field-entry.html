<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width">
<title>Import Field Entry</title><link rel="stylesheet" href="styles.css">
<style>body{background:#f4f1e9}main{max-width:760px;margin:auto;padding:30px}.box{background:white;border:1px solid #ccc;border-radius:18px;padding:20px;margin:15px 0}input,button{font:inherit;padding:12px;margin:5px}pre{white-space:pre-wrap}</style></head>
<body><main><h1>Import an offline field entry</h1><p>This temporary bridge lets an iPhone-downloaded entry be written into the repository from Chrome or Edge.</p><div class="box"><input id="entry" type="file" accept="application/json"><button id="repo" type="button">Choose repository</button><button id="go" type="button" disabled>Import</button><pre id="status">Choose the JSON entry and repository.</pre></div></main>
<script src="observations.js"></script><script src="import-field-entry.js"></script></body></html>
