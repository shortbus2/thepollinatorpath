<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Usage · Garden Brain</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="garden-brain.css"><style>.usage-wrap{max-width:820px;margin:auto;padding:20px 16px 80px}.usage-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.usage-card{background:#fff;border:1px solid #d6d4ca;border-radius:18px;padding:18px}.usage-card strong{display:block;font-size:1.7rem;font-family:Georgia,serif}.usage-table{width:100%;border-collapse:collapse}.usage-table td,.usage-table th{padding:10px;border-bottom:1px solid #ddd;text-align:left}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.toolbar button,.toolbar input{padding:11px;border-radius:10px;border:1px solid #999;background:white}@media(min-width:650px){.usage-grid{grid-template-columns:repeat(4,1fr)}}</style></head><body class="gb-body"><main class="usage-wrap"><a href="garden-brain.html">← Garden Brain</a><div class="eyebrow" style="margin-top:22px">Private analytics · 4.3.2 RC1</div><h1>AI Usage &amp; Value</h1><p>This dashboard tracks requests made from this browser. OpenAI billing remains the official total. Cross-device tracking will require a future server-side store.</p><div class="usage-grid" id="usageCards"></div><section class="usage-card" style="margin-top:14px"><h2>Value check</h2><div class="toolbar"><label>Manual minutes per observation <input id="manualMinutes" type="number" min="0" step=".25" value="3"></label><label>AI review minutes <input id="aiMinutes" type="number" min="0" step=".25" value=".75"></label><button id="saveValue">Update</button></div><p id="timeSaved"></p></section><section class="usage-card" style="margin-top:14px"><h2>Requests</h2><table class="usage-table"><thead><tr><th>Date</th><th>Photos</th><th>Tokens</th><th>Result</th></tr></thead><tbody id="usageRows"></tbody></table></section><section class="usage-card" style="margin-top:14px"><h2>Testing controls</h2><div class="toolbar"><button id="markNormal">Start normal-use baseline</button><button id="exportUsage">Export JSON</button><button id="resetUsage">Reset local statistics</button></div><p id="baselineNote"></p></section></main><script src="ai-usage.js"></script></body></html>
