<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Map Editor · Garden Brain</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="garden-brain.css"></head><body><main class="brain-wrap"><a href="map.html">← Public map</a><section class="brain-hero"><p class="eyebrow">Private tool</p><h1>Garden Map Editor</h1><p>Tap the map to add a placement. Drag markers to refine them. Changes stay on this device until you export them.</p></section><div class="editor-controls"><label>Map<select id="e-map"></select></label><label>Kind<select id="e-kind"><option value="plant">Plant</option><option value="object">Tree / feature</option></select></label><label>Subject<select id="e-subject"></select></label><label>Quantity<input id="e-qty" type="number" min="1" value="1"></label><label>Precision<select id="e-precision"><option>exact</option><option selected>approximate</option><option>area only</option></select></label><button id="export" class="button">Export placement update</button><button id="reset" class="button secondary">Reset local edits</button></div><div class="map-stage editor-stage" id="e-stage"><img id="e-image" alt="Editable garden map"><div id="e-layer"></div></div><p id="e-status" aria-live="polite"></p></main><script src="data.js"></script><script src="garden-brain.js"></script><script src="garden-map-editor.js"></script></body></html>
